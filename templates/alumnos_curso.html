{% extends "layout.html" %}
{% block content %}

<div class="bg-white p-8 rounded shadow-md">

<h2 class="text-2xl font-bold mb-6">
    Alumnos en {{ curso.nombre }}
</h2>

<ul class="space-y-2">
{% for alumno in curso.alumnos %}
    <li class="bg-gray-100 p-3 rounded">
        {{ alumno.nombre }}
    </li>
{% endfor %}
</ul>

</div>

{% endblock %}
