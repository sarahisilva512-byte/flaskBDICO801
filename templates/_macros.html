{% macro campoNuevo(field) %}

<div>
    <label class="block text-sm font-medium text-gray-700">
        {{ field.label }}
    </label>

    {{ field(class="mt-1 p-2 w-full border rounded") }}

    {% if field.errors %}
    <ul class="text-red-500 text-sm">
        {% for error in field.errors %}
            <li>{{ error }}</li>
        {% endfor %}
    </ul>
    {% endif %}
</div>

{% endmacro %}
