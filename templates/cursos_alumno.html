{% extends "layout.html" %}
{% block content %}

<div class="bg-white p-8 rounded shadow-md">

<h2 class="text-2xl font-bold mb-6">
    Cursos de {{ alumno.nombre }}
</h2>

<ul class="space-y-2">
{% for curso in alumno.cursos %}
    <li class="bg-gray-100 p-3 rounded">
        {{ curso.nombre }}
    </li>
{% endfor %}
</ul>

</div>

{% endblock %}
